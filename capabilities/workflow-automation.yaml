naftiko: "1.0.0-alpha1"

info:
  label: "Activepieces Workflow Automation"
  description: "Unified workflow capability for building, managing, monitoring, and debugging automation flows. Used by developers and no-code builders to orchestrate integrations across 400+ app connections."
  tags:
    - Activepieces
    - Automation
    - No-Code
    - Workflow
    - Integration
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ACTIVEPIECES_API_KEY: ACTIVEPIECES_API_KEY
      ACTIVEPIECES_PROJECT_ID: ACTIVEPIECES_PROJECT_ID

capability:
  consumes:
    - import: activepieces
      location: ./shared/activepieces.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: workflow-automation-api
      description: "Unified REST API for workflow automation with Activepieces."
      resources:
        - path: /v1/flows
          name: flows
          description: "Automation flow management"
          operations:
            - method: GET
              name: list-flows
              description: "List automation flows"
              call: "activepieces.list-flows"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-flow
              description: "Create a new automation flow"
              call: "activepieces.create-flow"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/flow-runs
          name: flow-runs
          description: "Execution monitoring"
          operations:
            - method: GET
              name: list-flow-runs
              description: "List flow execution runs"
              call: "activepieces.list-flow-runs"
              with:
                projectId: "rest.projectId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/connections
          name: connections
          description: "App connection management"
          operations:
            - method: GET
              name: list-connections
              description: "List app connections"
              call: "activepieces.list-connections"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/projects
          name: projects
          description: "Project management"
          operations:
            - method: GET
              name: list-projects
              description: "List projects"
              call: "activepieces.list-projects"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: workflow-automation-mcp
      transport: http
      description: "MCP server for AI-assisted workflow automation with Activepieces."
      tools:
        - name: list-flows
          description: "List all automation flows in the Activepieces project"
          hints:
            readOnly: true
            openWorld: true
          call: "activepieces.list-flows"
          with:
            projectId: "tools.projectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-flow
          description: "Create a new automation flow in Activepieces"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "activepieces.create-flow"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-flow
          description: "Retrieve a specific automation flow by ID"
          hints:
            readOnly: true
            openWorld: false
          call: "activepieces.get-flow"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-flow
          description: "Delete an automation flow"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "activepieces.delete-flow"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-flow-runs
          description: "List execution history for automation flows"
          hints:
            readOnly: true
            openWorld: true
          call: "activepieces.list-flow-runs"
          with:
            projectId: "tools.projectId"
            status: "tools.status"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-flow-run
          description: "Get details of a specific flow execution run"
          hints:
            readOnly: true
            openWorld: false
          call: "activepieces.get-flow-run"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-connections
          description: "List all app connections available in the project"
          hints:
            readOnly: true
            openWorld: true
          call: "activepieces.list-connections"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-projects
          description: "List all Activepieces projects"
          hints:
            readOnly: true
            openWorld: true
          call: "activepieces.list-projects"
          outputParameters:
            - type: object
              mapping: "$."

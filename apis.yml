aid: activepieces
name: Activepieces
description: >-
  Activepieces is an open-source, no-code automation platform that enables users to streamline
  workflows by connecting various applications and automating tasks. It supports over 400 MCP
  servers and integrations, allowing developers to build custom TypeScript-based pieces. The
  platform offers AI agents, MCPs, and workflow automation capabilities with both cloud and
  self-hosted deployment options.
type: Index
